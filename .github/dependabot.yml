version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/cloudflare"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    groups:
      cloudflare-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps-cloudflare)"

  - package-ecosystem: "npm"
    directory: "/pages-dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:20"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    groups:
      dashboard-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "eslint-plugin-react-hooks"
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps-dashboard)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:40"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 1
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci-cd
      - security
    commit-message:
      prefix: "chore(deps-actions)"
